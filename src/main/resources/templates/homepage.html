<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Welcome Page</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #6200ee; }
        .status { color: #4caf50; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h1 th:text="${title}">Status</h1>
    <p>Status Aplikasi: <span class="status">ONLINE</span></p>
    <p>Waktu Server: <span th:text="${time}">--:--</span></p>
    <p>Dijalankan di: <span th:text="${host}">Unknown</span></p>
    <hr>
    <small>Project JSON &copy; 2026 | Java 21 + Spring Boot</small>
</div>
</body>
</html>
